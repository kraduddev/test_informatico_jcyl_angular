server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tipos MIME correctos para módulos ES
    include /etc/nginx/mime.types;
    types {
        application/javascript  js mjs;
        application/json        json;
        text/plain              md;
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Caché: assets estáticos con hash → larga duración
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JSON de tests → sin caché (se actualizan con frecuencia)
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Markdown de supuestos → caché moderada
    location ~* \.md$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback: cualquier ruta sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}

